<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Phase 3: Passkey Register</title>
</head>
<body>
    <h2>Phase 3: WebAuthn Register (Passkey)</h2>
    <label>Username for WebAuthn:</label>
    <input type="text" id="wa-username" required>
    <button onclick="registerWebAuthn()">Register Passkey</button>
    <br><br><a href="/login">Go to Login</a>

    <script>
        function bufferDecode(value) {
            const base64 = value.replace(/-/g, '+').replace(/_/g, '/');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
            return bytes;
        }

        function bufferEncode(value) {
            const bytes = new Uint8Array(value);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }

        async function registerWebAuthn() {
            const username = document.getElementById('wa-username').value;
            if (!username) { alert("Please enter a username first."); return; }

            try {
                const optResponse = await fetch('/webauthn/register/options', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                if (!optResponse.ok) throw new Error((await optResponse.json()).detail);
                const options = await optResponse.json();

                options.challenge = bufferDecode(options.challenge);
                options.user.id = bufferDecode(options.user.id);
                if (options.excludeCredentials) {
                    options.excludeCredentials.forEach(cred => cred.id = bufferDecode(cred.id));
                }

                const credential = await navigator.credentials.create({ publicKey: options });

                const verificationResp = {
                    id: credential.id,
                    rawId: bufferEncode(credential.rawId),
                    type: credential.type,
                    response: {
                        attestationObject: bufferEncode(credential.response.attestationObject),
                        clientDataJSON: bufferEncode(credential.response.clientDataJSON),
                    },
                    username: username
                };

                const verifyResponse = await fetch('/webauthn/register/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(verificationResp)
                });
                const result = await verifyResponse.json();
                if (verifyResponse.ok) alert("WebAuthn Registration Success! 公鑰已儲存。");
                else alert("Verification Failed: " + result.detail);
            } catch (error) {
                console.error(error);
                alert("Registration Error: " + error.message);
            }
        }
    </script>
</body>
</html>
